<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Larissa ✨</title>

<style>

body{
margin:0;
background: radial-gradient(circle at bottom, #020111 0%, #000000 100%);
overflow:hidden;
color:white;
font-family: "Helvetica Neue", sans-serif;
text-align:center;
}

#stars{
position:absolute;
width:100%;
height:100%;
}

.star{
position:absolute;
background:white;
border-radius:50%;
opacity:0.7;
animation: move 10s linear infinite;
}

@keyframes move{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
border:1px solid white;
cursor:pointer;
letter-spacing:3px;
z-index:10;
}

.texto{
position:absolute;
top:40%;
width:100%;
opacity:0;
transition:2s;
font-size:20px;
line-height:1.8;
padding:0 20px;
}

.nome{
position:absolute;
top:50%;
width:100%;
font-size:40px;
letter-spacing:10px;
opacity:0;
transition:3s;
}

</style>

</head>

<body>

<div id="stars"></div>

<div id="start">✨ Iniciar ✨</div>

<audio id="musica" loop>
<source src="swim.mp3" type="audio/mpeg">
</audio>

<div class="texto" id="texto"></div>
<div class="nome" id="nome">Larissa</div>

<script>

// estrelas

for(let i=0;i<200;i++){

let star = document.createElement("div");

star.className="star";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
star.style.width=Math.random()*3+"px";
star.style.height=star.style.width;
star.style.animationDuration=(5+Math.random()*10)+"s";

document.getElementById("stars").appendChild(star);

}

// iniciar

document.getElementById("start").addEventListener("click", function(){

document.getElementById("musica").play();
this.style.display="none";

start();

});

function start(){

setTimeout(()=>{
texto.innerHTML="05 de Abril de 2000";
texto.style.opacity=1;
},2000);

setTimeout(()=>{
texto.innerHTML="O universo começou a se expandir...";
},7000);

setTimeout(()=>{
texto.innerHTML="Estrelas nasceram...";
},12000);

setTimeout(()=>{
texto.innerHTML="O tempo passou...";
},17000);

setTimeout(()=>{
texto.innerHTML="Entre bilhões de galáxias...";
},22000);

setTimeout(()=>{
texto.innerHTML="Algo raro surgiu...";
},27000);

setTimeout(()=>{
texto.innerHTML="05 de Abril de 2026";
},32000);

setTimeout(()=>{
texto.style.opacity=0;
nome.style.opacity=1;
},36000);

}

</script>

</body>
</html>

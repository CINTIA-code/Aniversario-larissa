<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Larissa ✨</title>

<style>

body{
margin:0;
background:black;
color:white;
overflow:hidden;
font-family: Arial, sans-serif;
text-align:center;
}

#stars{
position:fixed;
width:100%;
height:100%;
background:black;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation: twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:1px solid white;
padding:15px 30px;
cursor:pointer;
letter-spacing:2px;
}

.texto{
position:absolute;
top:30%;
width:100%;
opacity:0;
transition:2s;
font-size:18px;
line-height:1.6;
}

.nome{
position:absolute;
top:50%;
width:100%;
font-size:35px;
letter-spacing:8px;
opacity:0;
transition:3s;
}

</style>

</head>

<body>

<div id="stars"></div>

<div id="start">✨ Iniciar ✨</div>

<audio id="musica" loop>
<source src="swim.mp3" type="audio/mpeg">
</audio>

<div class="texto" id="texto"></div>
<div class="nome" id="nome">Larissa</div>

<script>

// estrelas

for(let i=0;i<200;i++){
let star = document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
star.style.animationDelay=Math.random()*3+"s";
document.getElementById("stars").appendChild(star);
}

// iniciar

document.getElementById("start").onclick=function(){

document.getElementById("musica").play();
this.style.display="none";

start();

}

function start(){

setTimeout(()=>{
texto.innerHTML="05 de Abril de 2000<br>O universo começou...";
texto.style.opacity=1;
},2000);

setTimeout(()=>{
texto.innerHTML="O tempo passou...";
},8000);

setTimeout(()=>{
texto.innerHTML="Entre bilhões de estrelas...";
},14000);

setTimeout(()=>{
texto.innerHTML="Algo raro nasceu...";
},20000);

setTimeout(()=>{
texto.style.opacity=0;
nome.style.opacity=1;
},25000);

}

</script>

</body>
</html>

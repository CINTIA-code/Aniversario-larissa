<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Larissa ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Helvetica Neue', sans-serif;
}

body{
background:black;
overflow:hidden;
color:white;
text-align:center;
height:100vh;
}

.stars{
position:absolute;
width:100%;
height:100%;
}

.star{
position:absolute;
background:white;
border-radius:50%;
opacity:0.7;
animation: float linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

.nebula{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 40%, rgba(120,0,255,0.2), transparent 50%),
radial-gradient(circle at 80% 60%, rgba(0,200,255,0.2), transparent 50%);
animation: moveNebula 20s infinite alternate;
}

@keyframes moveNebula{
0%{transform:scale(1)}
100%{transform:scale(1.2)}
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:1px solid white;
padding:15px 30px;
cursor:pointer;
letter-spacing:3px;
z-index:10;
}

.texto{
position:absolute;
top:45%;
width:100%;
opacity:0;
transition:2s;
font-size:22px;
padding:0 20px;
line-height:1.8;
}

.nome{
position:absolute;
top:50%;
width:100%;
font-size:50px;
letter-spacing:10px;
opacity:0;
transition:3s;
}

</style>

</head>

<body>

<div class="nebula"></div>
<div class="stars" id="stars"></div>

<div id="start">INICIAR</div>

<audio id="musica" loop>
<source src="swim.mp3" type="audio/mpeg">
</audio>

<div class="texto" id="texto"></div>
<div class="nome" id="nome">Larissa</div>

<script>

// estrelas

for(let i=0;i<300;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

let size=Math.random()*2;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.animationDuration=(10+Math.random()*20)+"s";

document.getElementById("stars").appendChild(star);

}

// iniciar

document.getElementById("start").addEventListener("click", function(){

document.getElementById("musica").play();

this.style.display="none";

timeline();

});


function timeline(){

setTimeout(()=>{
texto.innerHTML="05 de Abril de 2000";
texto.style.opacity=1;
},2000);

setTimeout(()=>{
texto.innerHTML="O universo começou a se expandir...";
},8000);

setTimeout(()=>{
texto.innerHTML="Bilhões de estrelas nasceram...";
},14000);

setTimeout(()=>{
texto.innerHTML="Galáxias se formaram...";
},20000);

setTimeout(()=>{
texto.innerHTML="O tempo continuou...";
},26000);

setTimeout(()=>{
texto.innerHTML="Entre bilhões de possibilidades...";
},32000);

setTimeout(()=>{
texto.innerHTML="Algo único surgiu...";
},38000);

setTimeout(()=>{
texto.style.opacity=0;
nome.style.opacity=1;
},44000);

}

</script>

</body>
</html>

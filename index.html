<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Larissa ✨</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family: "Helvetica Neue", Arial;
color:white;
text-align:center;
}

canvas{
position:absolute;
top:0;
left:0;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:1px solid white;
padding:15px 30px;
letter-spacing:3px;
cursor:pointer;
z-index:10;
}

.texto{
position:absolute;
top:30%;
width:100%;
opacity:0;
transition:2s;
font-size:18px;
line-height:1.8;
letter-spacing:1px;
}

.nome{
position:absolute;
top:50%;
width:100%;
font-size:34px;
letter-spacing:10px;
opacity:0;
transition:3s;
}

</style>

</head>

<body>

<div id="start">
✨ Iniciar ✨
</div>

<audio id="musica" loop>
<source src="swim.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<div class="texto" id="texto"></div>

<div class="nome" id="nome">
Larissa
</div>

<script>

// iniciar

document.getElementById("start").addEventListener("click", function(){
document.getElementById("musica").play();
this.style.display="none";
startAnimation();
});


// estrelas

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.3
});
}

function animateStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{

s.y += s.speed;

if(s.y > canvas.height){
s.y = 0;
}

ctx.fillStyle="white";
ctx.fillRect(s.x,s.y,s.size,s.size);

});

requestAnimationFrame(animateStars);

}


// animação

function startAnimation(){

animateStars();

setTimeout(()=>{
document.getElementById("texto").style.opacity=1;
document.getElementById("texto").innerHTML=
"05 de Abril de 2000<br>O universo começou a se mover...";
},3000);

setTimeout(()=>{
document.getElementById("texto").innerHTML=
"O tempo passou...<br>O universo continuou se expandindo...";
},9000);

setTimeout(()=>{
document.getElementById("texto").innerHTML=
"E entre bilhões de estrelas...<br>Algo raro estava sendo criado...";
},15000);

setTimeout(()=>{
document.getElementById("texto").innerHTML=
"05 de Abril de 2026";
},21000);

setTimeout(()=>{
document.getElementById("texto").style.opacity=0;
document.getElementById("nome").style.opacity=1;
},26000);

}

</script>

</body>
</html>

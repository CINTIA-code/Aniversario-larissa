<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Larissa ✨</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family: Arial, sans-serif;
color:white;
text-align:center;
}

canvas{
position:absolute;
top:0;
left:0;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
border:1px solid white;
padding:15px 30px;
letter-spacing:3px;
cursor:pointer;
z-index:10;
}

.texto{
position:absolute;
top:20%;
width:100%;
opacity:0;
transition:2s;
}

.nome{
position:absolute;
top:50%;
width:100%;
font-size:32px;
letter-spacing:8px;
opacity:0;
transition:3s;
}

</style>

</head>

<body>

<div id="start" onclick="startMusic()">
✨ Iniciar ✨
</div>

<audio id="musica" loop>
<source src="swim.mp3.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<div class="texto" id="texto">
05 de Abril de 2000<br>
O universo começou a se mover...
</div>

<div class="nome" id="nome">
Larissa
</div>

<script>

function startMusic(){
document.getElementById("musica").play();
document.getElementById("start").style.display="none";
startAnimation();
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let numbers = [];

for(let i=0;i<500;i++){
numbers.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
size: Math.random()*14,
speed: Math.random()*0.5,
number: Math.floor(Math.random()*10)
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

numbers.forEach(n=>{

n.y += n.speed;

if(n.y > canvas.height){
n.y = 0;
}

ctx.fillStyle = "rgba(255,255,255,0.6)";
ctx.font = n.size+"px Arial";
ctx.fillText(n.number,n.x,n.y);

});

requestAnimationFrame(animate);

}

function startAnimation(){

animate();

setTimeout(()=>{
document.getElementById("texto").style.opacity=1;
},3000);

setTimeout(()=>{
document.getElementById("texto").innerHTML=
"O tempo passou...<br>O universo evoluiu...";
},8000);

setTimeout(()=>{
document.getElementById("texto").innerHTML=
"05 de Abril de 2026";
},13000);

setTimeout(()=>{
document.getElementById("nome").style.opacity=1;
},16000);

}

</script>

</body>
</html>

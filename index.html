<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Larissa ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Helvetica Neue", Arial, sans-serif;
}

body{
background: radial-gradient(ellipse at bottom, #020111 0%, #000000 100%);
overflow:hidden;
color:white;
text-align:center;
height:100vh;
}

#stars{
position:absolute;
width:100%;
height:100%;
}

.star{
position:absolute;
background:white;
border-radius:50%;
opacity:0.8;
animation: move linear infinite;
}

@keyframes move{
from{transform:translateY(0)}
to{transform:translateY(-100vh)}
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:1px solid white;
padding:15px 35px;
letter-spacing:4px;
cursor:pointer;
z-index:10;
}

.texto{
position:absolute;
top:40%;
width:100%;
opacity:0;
transition:2s;
font-size:22px;
letter-spacing:1px;
line-height:1.8;
padding:0 20px;
}

.nome{
position:absolute;
top:50%;
width:100%;
font-size:48px;
letter-spacing:12px;
opacity:0;
transition:3s;
}

.sub{
position:absolute;
top:60%;
width:100%;
opacity:0;
transition:3s;
letter-spacing:3px;
}

</style>

</head>

<body>

<div id="stars"></div>

<div id="start">INICIAR</div>

<audio id="musica" loop preload="auto">
<source src="swim.mp3" type="audio/mpeg">
</audio>

<div class="texto" id="texto"></div>
<div class="nome" id="nome">Larissa</div>
<div class="sub" id="sub">05 de Abril de 2026</div>

<script>

// estrelas

for(let i=0;i<200;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

let size=Math.random()*2;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.animationDuration=(10+Math.random()*20)+"s";

document.getElementById("stars").appendChild(star);

}

// música + iniciar

const startBtn = document.getElementById("start");
const audio = document.getElementById("musica");

startBtn.addEventListener("click", ()=>{

audio.volume = 0.8;

audio.play().catch(()=>{});

startBtn.style.opacity="0";

startTimeline();

});

function startTimeline(){

setTimeout(()=>{
texto.innerHTML="05 de Abril de 2000";
texto.style.opacity=1;
},2000);

setTimeout(()=>{
texto.innerHTML="O universo começou a se expandir...";
},8000);

setTimeout(()=>{
texto.innerHTML="Estrelas nasceram...";
},14000);

setTimeout(()=>{
texto.innerHTML="Galáxias se formaram...";
},20000);

setTimeout(()=>{
texto.innerHTML="O tempo passou...";
},26000);

setTimeout(()=>{
texto.innerHTML="Entre bilhões de estrelas...";
},32000);

setTimeout(()=>{
texto.innerHTML="Algo raro surgiu...";
},38000);

setTimeout(()=>{
texto.style.opacity=0;
},44000);

setTimeout(()=>{
nome.style.opacity=1;
sub.style.opacity=1;
},47000);

}

</script>

</body>
</html>

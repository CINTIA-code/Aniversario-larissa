<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Larissa ✨</title>

<style>

body{
margin:0;
background:#020314;
overflow:hidden;
font-family: Arial, sans-serif;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
}

.container{
position:absolute;
top:30px;
width:100%;
text-align:center;
z-index:2;
}

#contador{
font-size:18px;
letter-spacing:3px;
color:#b8fff5;
opacity:0.8;
}

.nome{
margin-top:10px;
font-size:18px;
letter-spacing:5px;
opacity:0.7;
}

.mensagem{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
display:none;
padding:20px;
line-height:1.6;
}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">
<div id="contador"></div>
<div class="nome">Larissa</div>
</div>

<div class="mensagem" id="mensagem">

Larissa

Existe algo em você  
que não se explica  
apenas se sente  

Feliz aniversário ✨

</div>

<script>

// CONTAGEM

var data = new Date("April 5, 2026 00:00:00").getTime();

setInterval(()=>{

let agora = new Date().getTime();
let distancia = data - agora;

let dias = Math.floor(distancia/(1000*60*60*24));
let horas = Math.floor((distancia%(1000*60*60*24))/(1000*60*60));
let minutos = Math.floor((distancia%(1000*60*60))/(1000*60));
let segundos = Math.floor((distancia%(1000*60))/1000);

document.getElementById("contador").innerHTML=
dias+"d "+horas+"h "+minutos+"m "+segundos+"s";

if(distancia < 0){
document.getElementById("mensagem").style.display="block";
}

},1000);


// PARTICULAS IMAGEM

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

let image = new Image();
image.src = "larissa.png";

image.onload = function(){

let largura = 260;
let altura = 340;

ctx.drawImage(
image,
canvas.width/2 - largura/2,
canvas.height/2 - altura/2,
largura,
altura
);

let data = ctx.getImageData(0,0,canvas.width,canvas.height);

for(let y=0;y<canvas.height;y+=3){
for(let x=0;x<canvas.width;x+=3){

let index = (y*canvas.width+x)*4;

if(data.data[index+3] > 150){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
tx:x,
ty:y
});

}

}
}

animate();

}


function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x += (p.tx-p.x)*0.02;
p.y += (p.ty-p.y)*0.02;

ctx.fillStyle="rgba(170,255,255,0.5)";
ctx.fillRect(p.x,p.y,1.3,1.3);

});

requestAnimationFrame(animate);

}

</script>

</body>
</html>
